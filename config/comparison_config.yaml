# Codec Comparison Configuration

# Input audio files to test
audio_files:
  - data/test_audio/song1.wav
  - data/test_audio/song2.wav
  - data/test_audio/song3.wav

# Output directories
output:
  base_dir: outputs/evaluations
  figures_dir: outputs/figures

# Sample rate for all processing
sample_rate: 48000

# Codecs to compare
codecs:
  dac:
    enabled: true
    model_type: "44khz"  # Options: "16khz", "24khz", "44khz"
    bitrates: [16, 24, 32]  # Approximate bitrates in kbps
    
  encodec:
    enabled: true
    bandwidth: [6.0, 12.0, 24.0]  # Options: 1.5, 3.0, 6.0, 12.0, 24.0 kbps
    
  soundstream:
    enabled: false  # Set to true if you have SoundStream available
    bitrates: [16, 24, 32]

# Metrics to compute
metrics:
  si_sdr: true         # Scale-Invariant Signal-to-Distortion Ratio
  mel_distance: true   # Mel spectrogram distance
  mse: true            # Mean Squared Error
  mae: true            # Mean Absolute Error
  visqol: false        # ViSQOL (requires separate installation)

# Visualization settings
visualization:
  # Waveform comparison
  waveform:
    enabled: true
    zoom_duration: 2.0  # seconds to display
    
  # Reconstruction error analysis
  error:
    enabled: true
    normalize: true
    
  # Frequency band analysis
  frequency_bands:
    enabled: true
    bands:
      - [20, 250]      # Bass
      - [250, 2000]    # Low-Mid
      - [2000, 8000]   # High-Mid
      - [8000, 24000]  # Treble
      
  # Error distribution histogram
  error_distribution:
    enabled: true
    bins: 100
    
  # Metric comparison bar chart
  metric_comparison:
    enabled: true

# Advanced settings
advanced:
  # Use GPU if available
  use_gpu: true
  
  # Number of parallel workers for processing multiple files
  num_workers: 1
  
  # Save intermediate files (encoded representations)
  save_codes: false
  
  # Verbose output
  verbose: true
